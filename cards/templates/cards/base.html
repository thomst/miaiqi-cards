<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}miaiqi cards{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'cards/styles.css' %}">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <a href="{% url 'postcard_list' %}">
                    <img src="https://miaiqi.de/wp-content/uploads/2026/01/logo1-1.png" alt="Miaiqi Logo">
                    <h2>miaiqi cards</h2>
                </a>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="{% url 'postcard_list' %}">Gallery</a></li>
                </ul>
            </nav>
        </aside>
        <main class="main-content">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
