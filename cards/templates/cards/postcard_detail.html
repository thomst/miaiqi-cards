<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ postcard.title }}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'cards/styles.css' %}">
</head>
<body>
    <h1>{{ postcard.title }}</h1>
    <p><strong>Description:</strong> {{ postcard.description }}</p>
    <p><strong>Created:</strong> {{ postcard.created_at }}</p>
    <img src="{{ postcard.image.url }}" alt="{{ postcard.title }}" style="max-width: 300px;">
    <br>
    <a href="{% url 'postcard_list' %}">Back to list</a>
</body>
</html>
