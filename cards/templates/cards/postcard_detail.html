{% extends 'cards/base.html' %}
{% load static %}

{% block title %}{{ postcard.title }} - miaiqi cards{% endblock %}

{% block content %}
    <h1>{{ postcard.title }}</h1>
    <p><strong>Description:</strong> {{ postcard.description }}</p>
    <p><strong>Created:</strong> {{ postcard.created_at }}</p>
    <img src="{{ postcard.image.url }}" alt="{{ postcard.title }}" class="detail-image">
    <br>
    <a href="{% url 'postcard_list' %}">Back to list</a>
{% endblock %}
