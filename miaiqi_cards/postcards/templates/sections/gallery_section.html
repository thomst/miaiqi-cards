{% load static %}

<h2>{{ section.title }}</h2>
<div>
    {% for postcard in section.postcards.all %}
        <a href="{{ postcard.get_absolute_url }}?section_id={{ section.id }}">
            <figure>
                <img class="postcard" src="{{ postcard.image.url }}" alt="{{ postcard.title }}">
                <figcaption>{{ postcard.title }}</figcaption>
            </figure>
        </a>
    {% endfor %}
    <div class="postcard">More are coming soon...</div>
</div>
